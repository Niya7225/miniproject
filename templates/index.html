<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MalVision | Static Malware Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .hidden { display: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary">MalVision Engine</h1>
            <p class="text-secondary">Upload a raw executable for static structural analysis.</p>
        </div>

        <div class="card p-4 shadow-lg">
            <form id="uploadForm">
                <div class="mb-3">
                    <input class="form-control form-control-lg bg-dark text-light border-secondary" type="file" id="fileInput" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2" id="analyzeBtn">
                    Analyze File
                </button>
            </form>

            <div id="loading" class="text-center mt-4 hidden">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-secondary">Converting binary to texture and analyzing...</p>
            </div>

            <div id="resultBox" class="mt-4 hidden p-3 rounded bg-dark border border-secondary text-center">
                <h4 class="text-secondary mb-1">Analysis Complete</h4>
                <h2 id="malwareFamily" class="text-danger fw-bold mb-0"></h2>
                <p class="mt-2 mb-0">Confidence: <span id="confidenceScore" class="text-warning fw-bold"></span>%</p>
            </div>
            
            <div id="errorBox" class="mt-4 hidden alert alert-danger text-center"></div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');

            // Reset UI
            resultBox.classList.add('hidden');
            errorBox.classList.add('hidden');
            loading.classList.remove('hidden');
            analyzeBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    errorBox.textContent = data.error;
                    errorBox.classList.remove('hidden');
                } else {
                    document.getElementById('malwareFamily').textContent = data.family;
                    document.getElementById('confidenceScore').textContent = data.confidence;
                    resultBox.classList.remove('hidden');
                }
            } catch (error) {
                errorBox.textContent = 'Server error during analysis.';
                errorBox.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
